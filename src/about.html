<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Facebook</title>
    <style>
        html {
            --fb-color: #1a77f2;
            --warning-color: rgb(255, 59, 48);
            --warning-color-pressed: rgb(199, 49, 42);
            --web-wash: rgb(240, 242, 245);
            --web-wash-dark: #18191a;
            --fb-nav-dark: #242526;
            --fb-color-dark: #d2e3fc;
        }

        body {
            font-family: sans-serif;
            height: 100%;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        body.dark {
            background: #242526;
            color: white;
            color-scheme: dark;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        strong {
            color: var(--fb-color);
        }

        .dark h1,
        .dark h2,
        .dark h3,
        .dark h4,
        .dark h5,
        .dark h6,
        .dark strong {
            color: var(--fb-color-dark)
        }

        .hidden {
            display: none;
        }

        #wrapper {
            display: flex;
            flex-direction: row;
            vertical-align: middle;
        }

        #wrapper img {
            align-self: center;
            height: 160px;
            margin-right: 20px;
            vertical-align: middle;
        }

        #wrapper div {
            vertical-align: middle;
        }

        .window-buttons-wrapper {
            display: flex;
            position: fixed;
            right: 0;
            top: 0;
        }

        .window-button {
            background: transparent;
            border: none;
            height: 32px;
            outline: none;
            width: 48px;
            -webkit-app-region: no-drag;
        }

        .window-button svg path {
            fill: black;
        }

        .window-button.hover svg path {
            fill: black !important;
        }

        .dark .window-button svg path,
        .black .window-button svg path {
            fill: white;
        }

        .window-button.close.hover {
            background: #ff5e57;
        }

        .window-button.maximize.hover,
        .window-button.unmaximize.hover {
            background: #28c840;
        }

        .window-button.minimize.hover {
            background: #ffbe2c;
        }

        #app-version,
        #yuh {
            color: var(--fb-color);
            font-weight: bold;
        }

        .dark #app-version,
        .dark #yuh {
            color: var(--fb-color-dark);
        }

        #yuh {
            border-bottom: 1px solid var(--fb-color);
            cursor: pointer;
        }

        .dark #yuh {
            border-bottom: 1px solid var(--fb-color-dark);
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <img src="assets/facebook.png" alt="Facebook logo">
        <div>
            <h3>Native Facebook</h3>
            <p>Version <span id="app-version"></span></p>
            <p>Developed by <strong>YUH APPS</strong>. Made with <strong>Electron by GitHub</strong>. "Facebook" is a
                registered trademark of Meta Platforms, Inc.</p>
            <p><span id="yuh">Developed by YUH APPS.</span></p>
        </div>
    </div>
    <div class="window-buttons-wrapper hidden">
        <button class="window-button minimize hidden"> <!-- min -->
            <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M3 8C3 7.72386 3.22386 7.5 3.5 7.5H12.5C12.7761 7.5 13 7.72386 13 8C13 8.27614 12.7761 8.5 12.5 8.5H3.5C3.22386 8.5 3 8.27614 3 8Z" />
            </svg>
        </button>
        <button class="window-button maximize hidden"> <!-- max -->
            <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M2 4.5C2 3.11929 3.11929 2 4.5 2H11.5C12.8807 2 14 3.11929 14 4.5V11.5C14 12.8807 12.8807 14 11.5 14H4.5C3.11929 14 2 12.8807 2 11.5V4.5ZM4.5 3C3.67157 3 3 3.67157 3 4.5V11.5C3 12.3284 3.67157 13 4.5 13H11.5C12.3284 13 13 12.3284 13 11.5V4.5C13 3.67157 12.3284 3 11.5 3H4.5Z" />
            </svg>
        </button>
        <button class="window-button unmaximize hidden"> <!-- unmax -->
            <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M5.08496 4C5.29088 3.4174 5.8465 3 6.49961 3H9.99961C11.6565 3 12.9996 4.34315 12.9996 6V9.5C12.9996 10.1531 12.5822 10.7087 11.9996 10.9146V6C11.9996 4.89543 11.1042 4 9.99961 4H5.08496ZM4.5 5H9.5C10.3284 5 11 5.67157 11 6.5V11.5C11 12.3284 10.3284 13 9.5 13H4.5C3.67157 13 3 12.3284 3 11.5V6.5C3 5.67157 3.67157 5 4.5 5ZM4.5 6C4.22386 6 4 6.22386 4 6.5V11.5C4 11.7761 4.22386 12 4.5 12H9.5C9.77614 12 10 11.7761 10 11.5V6.5C10 6.22386 9.77614 6 9.5 6H4.5Z" />
            </svg>
        </button>
        <button class="window-button close"> <!-- close -->
            <svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M2.58859 2.71569L2.64645 2.64645C2.82001 2.47288 3.08944 2.4536 3.28431 2.58859L3.35355 2.64645L8 7.293L12.6464 2.64645C12.8417 2.45118 13.1583 2.45118 13.3536 2.64645C13.5488 2.84171 13.5488 3.15829 13.3536 3.35355L8.707 8L13.3536 12.6464C13.5271 12.82 13.5464 13.0894 13.4114 13.2843L13.3536 13.3536C13.18 13.5271 12.9106 13.5464 12.7157 13.4114L12.6464 13.3536L8 8.707L3.35355 13.3536C3.15829 13.5488 2.84171 13.5488 2.64645 13.3536C2.45118 13.1583 2.45118 12.8417 2.64645 12.6464L7.293 8L2.64645 3.35355C2.47288 3.17999 2.4536 2.91056 2.58859 2.71569L2.64645 2.64645L2.58859 2.71569Z" />
            </svg>
        </button>
    </div>
    <script>
        const { ipcRenderer } = require('electron')
        const remote = require('@electron/remote')
        const currentWindow = remote.getCurrentWindow()
        const isWindows = remote.process.platform !== 'darwin'
        const button = document.querySelector('.window-button.close')
        const appVersion = document.querySelector('#app-version')

        if (isWindows) {
            button.classList.remove('hidden')
            button.parentElement.classList.remove('hidden')
            button.onmouseenter = (e) => {
                button.classList.add('hover')
            }
            button.onmouseleave = (e) => {
                button.classList.remove('hover')
            }
            button.onclick = (e) => {
                currentWindow.close()
            }
        }

        appVersion.textContent = remote.app.getVersion()

        document.querySelector('#yuh').onclick = (e) => {
            ipcRenderer.send('open-yh-page')
            window.close()
        }

        ipcRenderer.on('dark', (e, dark, version) => {
            if (dark) document.body.classList.add('dark')
            appVersion.textContent = version
        })
    </script>
</body>

</html>
